version: 2

project_name: template-repository

before:
  hooks:
    - sh -c "cd web-vite && bun install && bun run build"
    - sh -c "rm -rf ./internal/web/api/static && mkdir -p ./internal/web/api/static"
    - sh -c "cp -r ./web-vite/dist/. ./internal/web/api/static/"

# ──────────────────────────────────────────────
# CLI / Service: remove the builds section if this is a library-only project.
# ──────────────────────────────────────────────
builds:
  - id: template-repository
    main: ./cmd/template-repository/main.go
    binary: template-repository
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -buildvcs=true
    ldflags:
      - -s -w
      - -X 'github.com/jimmicro/version.GitTag={{.Tag}}'
      - -X 'github.com/jimmicro/version.BuildTime={{.Date}}'
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
  - id: web
    main: ./cmd/web/main.go
    binary: web
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -buildvcs=true
    ldflags:
      - -s -w
      - -X 'github.com/jimmicro/version.GitTag={{.Tag}}'
      - -X 'github.com/jimmicro/version.BuildTime={{.Date}}'
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    files:
      - none*

# ──────────────────────────────────────────────
# Service only: remove the dockers_v2 section if not publishing images.
# Each entry explicitly maps a published image to a build id.
# Add another build id + Dockerfile here when you want to publish more binaries.
# ──────────────────────────────────────────────
dockers_v2:
  - id: template-repository
    ids:
      - template-repository
    platforms:
      - linux/amd64
      - linux/arm64
    images:
      - "ghcr.io/jimyag/template-repository"
    tags:
      - "{{ .Tag }}"
      - "latest"
    dockerfile: Dockerfile.release.template-repository
    sbom: none
    labels:
      org.opencontainers.image.created: "{{.Date}}"
      org.opencontainers.image.title: "{{.ProjectName}}"
      org.opencontainers.image.revision: "{{.FullCommit}}"
      org.opencontainers.image.version: "{{.Tag}}"
  - id: web
    ids:
      - web
    platforms:
      - linux/amd64
      - linux/arm64
    images:
      - "ghcr.io/jimyag/template-repository-web"
    tags:
      - "{{ .Tag }}"
      - "latest"
    dockerfile: Dockerfile.release.web
    sbom: none
    labels:
      org.opencontainers.image.created: "{{.Date}}"
      org.opencontainers.image.title: "{{.ProjectName}}"
      org.opencontainers.image.revision: "{{.FullCommit}}"
      org.opencontainers.image.version: "{{.Tag}}"

release:
  github:
    owner: jimyag
    name: template-repository
  mode: replace

changelog:
  use: github-native
